---
fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: remove-crlf
      - id: remove-tabs
  - repo: https://github.com/sirosen/texthooks
    rev: 0.6.6
    hooks:
      - id: fix-smartquotes
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - args:
          - --config-file
          - .yamllint
        id: yamllint
  - repo: local
    hooks:
      - id: validate-release-workflows
        name: Validate release workflow contracts
        entry: bash tests/validate-release-workflows.sh
        language: system
        pass_filenames: false
      - id: validate-gitignore
        name: Validate gitignore is not violated by tracked files
        entry: bash tests/validate-gitignore.sh
        language: system
        pass_filenames: false
      - id: ansible-lint
        name: Ansible-lint
        entry: ansible-lint
        language: system
        pass_filenames: false
