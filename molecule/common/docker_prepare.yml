---
- name: Bootstrap APT-based Docker instances
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Install Python and packages required for Ansible
      ansible.builtin.raw: >-
        apt-get update &&
        DEBIAN_FRONTEND=noninteractive apt-get install -y
        ca-certificates python3 python3-apt gnupg
      changed_when: false

- name: Prepare APT-based Docker instances
  hosts: all
  gather_facts: true
  become: false
  tasks:
    - name: Ensure apt cache is fresh
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
