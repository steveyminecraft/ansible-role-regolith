---
- name: Set test host facts
  ansible.builtin.set_fact:
    ansible_facts: >-
      {{
        ansible_facts | default({})
        | combine({
            'os_family': 'Debian',
            'distribution': test_case.distribution,
            'distribution_release': test_case.release,
            'architecture': test_case.architecture,
          }, recursive=True)
      }}

- name: Load host facts for role use
  ansible.builtin.include_tasks: "{{ regolith_role_path }}/tasks/facts.yml"
  vars:
    regolith_repository_architecture: "{{ test_case.expected_arch }}"

- name: Define Regolith repository facts
  ansible.builtin.include_tasks: "{{ regolith_role_path }}/tasks/repository_facts.yml"

- name: Build expected repository line
  ansible.builtin.set_fact:
    regolith_expected_repository: >-
      deb [arch={{ test_case.expected_arch }} signed-by={{ regolith_repository_keyring }}]
      {{ regolith_repository_base_url }}/{{ test_case.distribution | lower }}/{{ regolith_repository_suite }}
      {{ test_case.release }} {{ regolith_repository_component }}
    regolith_expected_legacy_repository: >-
      deb [arch=amd64 signed-by="/etc/apt/trusted.gpg.d/regolith.asc"]
      https://regolith-desktop.org/release-3_2-{{ test_case.distribution | lower }}-{{ test_case.release }}-amd64
      {{ test_case.release }} main

- name: Normalize repository strings for comparison
  ansible.builtin.set_fact:
    regolith_repository_normalized: "{{ regolith_repository | regex_replace('\\s+', ' ') | trim }}"
    regolith_expected_repository_normalized: "{{ regolith_expected_repository | regex_replace('\\s+', ' ') | trim }}"
    regolith_legacy_repository_normalized: "{{ regolith_legacy_repository | regex_replace('\\s+', ' ') | trim }}"
    regolith_expected_legacy_repository_normalized: "{{ regolith_expected_legacy_repository | regex_replace('\\s+', ' ') | trim }}"

- name: Assert repository line matches official install format
  ansible.builtin.assert:
    that:
      - regolith_repository_normalized == regolith_expected_repository_normalized
    fail_msg: >-
      Repository line mismatch for {{ test_case.distribution }} {{ test_case.release }}.
      Expected: {{ regolith_expected_repository_normalized }}
      Got: {{ regolith_repository_normalized }}

- name: Assert legacy repository line is correct
  ansible.builtin.assert:
    that:
      - regolith_legacy_repository_normalized == regolith_expected_legacy_repository_normalized
    fail_msg: >-
      Legacy repository line mismatch for {{ test_case.distribution }} {{ test_case.release }}.
      Expected: {{ regolith_expected_legacy_repository_normalized }}
      Got: {{ regolith_legacy_repository_normalized }}
