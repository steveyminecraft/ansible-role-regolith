---
- name: Unit test Regolith repository facts
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../../../vars/main.yml
    - ../../../defaults/main.yml
  vars:
    regolith_role_path: "{{ playbook_dir }}/../../.."
    regolith_test_keyring_path: /tmp/regolith-unit-test-keyring.gpg
    regolith_keyring_fixture_v1_url: >-
      file://{{ regolith_role_path }}/molecule/common/files/regolith-test-key-v1.asc
    regolith_keyring_fixture_v2_url: >-
      file://{{ regolith_role_path }}/molecule/common/files/regolith-test-key-v2.asc
    regolith_keyring_lifecycle_matrix:
      - name: initial install from fixture v1
        key_url: "{{ regolith_keyring_fixture_v1_url }}"
        expect_changed: true
      - name: rotate to fixture v2
        key_url: "{{ regolith_keyring_fixture_v2_url }}"
        expect_changed: true
    regolith_repository_key_url: https://archive.regolith-desktop.com/regolith.key
    regolith_repository_keyring: /usr/share/keyrings/regolith-archive-keyring.gpg
    regolith_repository_base_url: https://archive.regolith-desktop.com
    regolith_repository_suite: stable
    regolith_repository_component: v3.4
    regolith_validation_failure_matrix:
      - name: unsupported OS family
        os_family: RedHat
        distribution: Fedora
        release: "41"
        architecture: x86_64
        expected_message: Regolith role supports Ubuntu and Debian systems only.
      - name: unsupported Debian-family derivative
        os_family: Debian
        distribution: Linux Mint
        release: wilma
        architecture: x86_64
        expected_message: Regolith role supports Ubuntu and Debian only.
      - name: unsupported Ubuntu release
        os_family: Debian
        distribution: Ubuntu
        release: focal
        architecture: x86_64
        expected_message: Got unsupported release focal.
      - name: unsupported architecture
        os_family: Debian
        distribution: Ubuntu
        release: noble
        architecture: riscv64
        expected_message: Got riscv64.
      - name: unsupported architecture override
        os_family: Debian
        distribution: Ubuntu
        release: noble
        architecture: x86_64
        repository_architecture: ppc64le
        expected_message: Got ppc64le.
      - name: mismatched amd64 host with arm64 override
        os_family: Debian
        distribution: Ubuntu
        release: noble
        architecture: x86_64
        repository_architecture: arm64
        expected_message: Cross-architecture installation is not supported by this role.
      - name: mismatched arm64 host with amd64 override
        os_family: Debian
        distribution: Ubuntu
        release: noble
        architecture: aarch64
        repository_architecture: amd64
        expected_message: Cross-architecture installation is not supported by this role.
      - name: riscv64 host with nominal amd64 override
        os_family: Debian
        distribution: Ubuntu
        release: noble
        architecture: riscv64
        repository_architecture: amd64
        expected_message: Got riscv64.
    regolith_architecture_success_matrix:
      - name: auto-detect amd64 on x86_64
        architecture: x86_64
        expected_arch: amd64
      - name: auto-detect arm64 on aarch64
        architecture: aarch64
        expected_arch: arm64
      - name: matching amd64 override on x86_64
        architecture: x86_64
        repository_architecture: amd64
        expected_arch: amd64
      - name: matching arm64 override on aarch64
        architecture: aarch64
        repository_architecture: arm64
        expected_arch: arm64
  tasks:
    - name: Run package selection tests
      ansible.builtin.include_tasks: tasks/test_package_selection.yml

    - name: Run distribution package path tests
      ansible.builtin.include_tasks: tasks/test_distribution_packages.yml

    - name: Run validation failure tests
      ansible.builtin.include_tasks: tasks/test_validation_failure.yml
      loop: "{{ regolith_validation_failure_matrix }}"
      loop_control:
        loop_var: test_case
        label: "{{ test_case.name }}"

    - name: Run architecture validation tests
      ansible.builtin.include_tasks: tasks/test_architecture_validation.yml

    - name: Run keyring lifecycle tests
      ansible.builtin.include_tasks: tasks/test_keyring_lifecycle.yml

    - name: Run repository fact tests
      ansible.builtin.include_tasks: tasks/test_repository_facts.yml
      loop: "{{ regolith_unit_test_matrix }}"
      loop_control:
        loop_var: test_case
        label: "{{ test_case.distribution }} {{ test_case.release }} ({{ test_case.expected_arch }})"
