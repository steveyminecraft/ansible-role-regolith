---
# Template used by GitHub Actions AWS remote tests.
# Runtime values are generated by tests/remote/aws/create-ephemeral-env.sh.
all:
  hosts:
    REPLACE_HOST_NAME:
      ansible_host: REPLACE_PUBLIC_IP
      ansible_ssh_private_key_file: REPLACE_SSH_KEY_PATH
  vars:
    ansible_user: REPLACE_ANSIBLE_USER
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    regolith_repository_suite: stable
    regolith_repository_component: v3.4
