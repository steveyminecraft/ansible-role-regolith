---
- name: Ensure operating system family is supported
  ansible.builtin.assert:
    that:
      - regolith_os_family == "Debian"
    fail_msg: >-
      Regolith role supports Ubuntu and Debian systems only.
      Got OS family {{ regolith_os_family | default('unknown') }}.
    quiet: true

- name: Ensure distribution is supported
  ansible.builtin.assert:
    that:
      - regolith_distribution in regolith_supported_distributions
    fail_msg: >-
      Regolith role supports Ubuntu and Debian only.
      Got unsupported distribution {{ regolith_distribution | default('unknown') }}.
    quiet: true

- name: Ensure distribution release is supported
  ansible.builtin.assert:
    that:
      - regolith_distribution_release in regolith_supported_distributions[regolith_distribution]
    fail_msg: >-
      Regolith role supports {{ regolith_distribution }}
      releases {{ regolith_supported_distributions[regolith_distribution] | join(', ') }}.
      Got unsupported release {{ regolith_distribution_release | default('unknown') }}.
    quiet: true

- name: Ensure repository architecture override is supported
  ansible.builtin.assert:
    that:
      - regolith_repository_architecture in regolith_supported_architectures.values()
    fail_msg: >-
      Regolith repository architecture must be one of
      {{ regolith_supported_architectures.values() | unique | join(', ') }}.
      Got {{ regolith_repository_architecture | default('unknown') }}.
    quiet: true
  when: regolith_repository_architecture is defined

- name: Ensure detected architecture is supported
  ansible.builtin.assert:
    that:
      - regolith_detected_architecture in regolith_supported_architectures
    fail_msg: >-
      Regolith role supports repository architectures
      {{ regolith_supported_architectures.values() | unique | join(', ') }} only.
      Got machine architecture {{ regolith_detected_architecture | default('unknown') }}.
    quiet: true
  when: regolith_repository_architecture is not defined

- name: Set detected repository architecture
  ansible.builtin.set_fact:
    regolith_repository_architecture: "{{ regolith_supported_architectures[regolith_detected_architecture] }}"
  when: regolith_repository_architecture is not defined

- name: Ensure repository settings are valid
  ansible.builtin.assert:
    that:
      - regolith_repository_key_url is match('^https?://.+')
      - regolith_repository_base_url is match('^https?://.+')
      - regolith_repository_keyring | length > 0
      - regolith_repository_suite | length > 0
      - regolith_repository_component in ['v3.4', 'main']
    fail_msg: >-
      Regolith repository settings must use non-empty HTTP(S) URLs,
      a non-empty keyring path and suite, and component v3.4 or main.
    quiet: true

- name: Ensure package selections are valid
  ansible.builtin.assert:
    that:
      - regolith_repository_prerequisite_packages | type_debug == 'list'
      - regolith_packages | type_debug == 'list'
      - regolith_repository_prerequisite_packages | reject('string') | list | length == 0
      - regolith_packages | reject('string') | list | length == 0
      - regolith_repository_prerequisite_packages | select('equalto', '') | list | length == 0
      - regolith_packages | select('equalto', '') | list | length == 0
    fail_msg: >-
      Regolith prerequisite and install package variables must be lists
      containing non-empty package name strings.
    quiet: true
