---
- name: Load host facts for role use
  ansible.builtin.set_fact:
    regolith_distribution: "{{ ansible_facts.distribution }}"
    regolith_distribution_release: "{{ ansible_facts.distribution_release }}"
    regolith_os_family: "{{ ansible_facts.os_family }}"
    regolith_repository_architecture: >-
      {{ regolith_repository_architecture
         | default('arm64' if ansible_facts.architecture in ['aarch64', 'arm64'] else 'amd64') }}
