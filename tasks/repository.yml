---
- name: Define Regolith repository facts
  ansible.builtin.include_tasks: repository_facts.yml

- name: Ensure Regolith repository prerequisites are installed
  ansible.builtin.apt:
    name: "{{ regolith_repository_prerequisite_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 600

- name: Manage Regolith apt keyring
  block:
    - name: Create temporary file for Regolith apt key
      ansible.builtin.tempfile:
        state: file
        suffix: .asc
      register: regolith_repository_key_tempfile
      changed_when: false

    - name: Create temporary file for dearmored Regolith apt keyring
      ansible.builtin.tempfile:
        state: file
        suffix: .gpg
      register: regolith_repository_keyring_tempfile
      changed_when: false

    - name: Download Regolith apt key
      ansible.builtin.get_url:
        url: "{{ regolith_repository_key_url }}"
        dest: "{{ regolith_repository_key_tempfile.path }}"
        force: true
        mode: "0644"
      changed_when: false

    - name: Dearmor Regolith apt key to temporary keyring
      ansible.builtin.command:
        cmd: >-
          gpg --dearmor --yes --output {{ regolith_repository_keyring_tempfile.path }}
          {{ regolith_repository_key_tempfile.path }}
      changed_when: false

    - name: Install Regolith apt keyring
      ansible.builtin.copy:
        src: "{{ regolith_repository_keyring_tempfile.path }}"
        dest: "{{ regolith_repository_keyring }}"
        mode: "0644"
        remote_src: true
      register: regolith_repository_keyring_copy
  always:
    - name: Remove temporary Regolith apt key
      ansible.builtin.file:
        path: "{{ regolith_repository_key_tempfile.path }}"
        state: absent
      changed_when: false
      when: regolith_repository_key_tempfile.path is defined

    - name: Remove temporary dearmored Regolith apt keyring
      ansible.builtin.file:
        path: "{{ regolith_repository_keyring_tempfile.path }}"
        state: absent
      changed_when: false
      when: regolith_repository_keyring_tempfile.path is defined

- name: Ensure old Regolith repository is absent
  ansible.builtin.apt_repository:
    repo: "{{ regolith_legacy_repository }}"
    state: absent
    filename: regolith
    update_cache: false

- name: Ensure Regolith repository source list is configured
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/regolith.list
    content: "{{ regolith_repository }}\n"
    mode: "0644"
  register: regolith_repository_file

- name: Update apt cache after repository configuration changes
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  when: regolith_repository_file.changed or regolith_repository_keyring_copy.changed
