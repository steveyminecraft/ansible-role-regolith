---
name: Integration tests

on:  # yamllint disable-line rule:truthy
  workflow_run:
    workflows:
      - Unit tests
    types:
      - completed
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  block-on-failed-prerequisite:
    name: Reject failed lint or security workflow
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Fail fast when Unit tests or Trivy failed
        run: |
          echo "${{ github.event.workflow_run.name }} concluded ${{ github.event.workflow_run.conclusion }}."
          exit 1

  prerequisites:
    name: Verify lint and security prerequisites
    needs: block-on-failed-prerequisite
    if: >-
      always() &&
      needs.block-on-failed-prerequisite.result == 'skipped'
    runs-on: ubuntu-24.04
    outputs:
      head_sha: ${{ steps.resolve.outputs.head_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve commit to test
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require successful Unit tests and Trivy
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          python3 scripts/verify_ci_prerequisites.py \
            --head-sha "${HEAD_SHA}" \
            --wait \
            --timeout-minutes 90

      - name: Skip prerequisite API check for scheduled or manual runs
        if: github.event_name != 'workflow_run'
        run: echo "Scheduled and manual integration runs do not wait on Unit tests or Trivy."

  integration:
    name: ${{ matrix.label }}
    needs: prerequisites
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python:3.13-bookworm
            label: Debian bookworm
          - image: python:3.13-trixie
            label: Debian trixie
          - image: ubuntu:22.04
            label: Ubuntu 22.04 (jammy)
          - image: ubuntu:24.04
            label: Ubuntu 24.04 (noble)
          - image: ubuntu:25.04
            label: Ubuntu 25.04 (plucky)
          - image: ubuntu:25.10
            label: Ubuntu 25.10 (questing)

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prerequisites.outputs.head_sha }}

      - name: Bootstrap container
        uses: ./.github/actions/bootstrap-container

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run integration test
        uses: ./.github/actions/run-integration-test
