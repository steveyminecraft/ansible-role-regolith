---
name: CI — Regolith: container integration

on:  # yamllint disable-line rule:truthy
  pull_request:
  workflow_run:
    workflows:
      - CI — Regolith: lint & unit tests
    types:
      - completed
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: integration-tests-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  prerequisites:
    name: Gate: lint, unit & Trivy
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-24.04
    outputs:
      head_sha: ${{ steps.resolve.outputs.head_sha }}
    steps:
      - name: Fail fast when lint & unit workflow failed
        if: >-
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success'
        run: |
          echo "${{ github.event.workflow_run.name }} concluded ${{ github.event.workflow_run.conclusion }}."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve commit to test
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require successful lint/unit and Trivy workflows
        if: github.event_name == 'workflow_run' || github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          python3 scripts/verify_ci_prerequisites.py \
            --head-sha "${HEAD_SHA}" \
            --wait \
            --timeout-minutes 90

      - name: Skip prerequisite API check for scheduled or manual runs
        if: github.event_name != 'workflow_run' && github.event_name != 'pull_request'
        run: echo "Scheduled and manual integration runs do not wait on lint/unit or Trivy."

  integration:
    name: ${{ matrix.label }}
    needs: prerequisites
    if: needs.prerequisites.result == 'success'
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python:3.13-bookworm
            label: Debian bookworm
          - image: python:3.13-trixie
            label: Debian trixie
          - image: ubuntu:24.04
            label: Ubuntu 24.04 (noble)
          - image: ubuntu:25.04
            label: Ubuntu 25.04 (plucky)
          - image: ubuntu:25.10
            label: Ubuntu 25.10 (questing)

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prerequisites.outputs.head_sha }}

      - name: Bootstrap container
        uses: ./.github/actions/bootstrap-container

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run integration test
        uses: ./.github/actions/run-integration-test

  aws-pr-remote-tests:
    name: AWS EC2 remote tests
    needs:
      - prerequisites
      - integration
    if: >-
      github.event_name == 'pull_request' &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--branches--') &&
      needs.integration.result == 'success'
    uses: ./.github/workflows/rc-aws-remote-tests.yml
    permissions:
      contents: read
      actions: read
      id-token: write
    secrets: inherit
    with:
      git_ref: ${{ needs.prerequisites.outputs.head_sha }}
      integration_workflow_run_id: ${{ github.run_id }}
