---
name: Integration tests

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: python:3.12-bookworm
            label: Debian bookworm
          - image: debian:trixie
            label: Debian trixie
          - image: ubuntu:24.04
            label: Ubuntu 24.04 (noble)
          - image: ubuntu:25.04
            label: Ubuntu 25.04 (plucky)
          - image: ubuntu:25.10
            label: Ubuntu 25.10 (questing)

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Bootstrap container
        uses: ./.github/actions/bootstrap-container

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run integration test
        uses: ./.github/actions/run-integration-test
