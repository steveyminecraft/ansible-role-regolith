---
name: Integration tests

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  molecule-debian:
    name: Debian (${{ matrix.scenario }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - debian-bookworm
          - debian-trixie

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run Molecule scenario
        run: molecule test -s ${{ matrix.scenario }}

  molecule-ubuntu:
    name: Ubuntu (${{ matrix.scenario }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - ubuntu-noble
          - ubuntu-plucky
          - ubuntu-questing

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run Molecule scenario
        run: molecule test -s ${{ matrix.scenario }}
