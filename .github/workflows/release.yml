---
name: Release

on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-galaxy:
        description: "Import the role into Ansible Galaxy"
        default: true
        required: false
        type: boolean
      galaxy-role-name:
        description: "Galaxy role name"
        default: regolith
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ansible
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        run: python -m pip install 'ansible-core>=2.20,<2.21'

      - name: Import role into Ansible Galaxy
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
          GALAXY_ROLE_NAME: ${{ inputs.galaxy-role-name || 'regolith' }}
          PUBLISH_GALAXY: >-
            ${{ github.event_name != 'workflow_dispatch' || inputs.publish-galaxy }}
        run: |
          if [ "${PUBLISH_GALAXY}" != "true" ]; then
            echo "Galaxy import skipped by workflow input."
            exit 0
          fi

          if [ -z "${GALAXY_API_KEY}" ]; then
            echo "GALAXY_API_KEY is not set; skipping Galaxy import."
            exit 0
          fi

          ansible-galaxy role import \
            --api-key "${GALAXY_API_KEY}" \
            --role-name "${GALAXY_ROLE_NAME}" \
            "${GITHUB_REPOSITORY_OWNER}" \
            "${GITHUB_REPOSITORY#*/}"
