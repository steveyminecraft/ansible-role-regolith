---
name: Release — Regolith: Galaxy import (manual)

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing semantic version tag to publish, for example v1.2.3"
        required: true
        type: string
      galaxy-role-name:
        description: "Galaxy role name"
        default: regolith
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-galaxy:
    name: Publish Galaxy (recovery)
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.release-tag }}

      - name: Import role into Ansible Galaxy
        uses: ./.github/actions/import-galaxy-role
        with:
          role-name: ${{ inputs.galaxy-role-name || 'regolith' }}
          git-reference: ${{ inputs.release-tag }}
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
