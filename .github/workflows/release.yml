---
name: Release

on:  # yamllint disable-line rule:truthy
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish-galaxy:
        description: "Import the role into Ansible Galaxy"
        default: true
        required: false
        type: boolean
      galaxy-role-name:
        description: "Galaxy role name"
        default: regolith
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Import role into Ansible Galaxy
        if: >-
          github.event_name == 'release'
          || github.event_name == 'workflow_dispatch' && inputs.publish-galaxy
        uses: ./.github/actions/import-galaxy-role
        with:
          role-name: ${{ inputs.galaxy-role-name || 'regolith' }}
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
