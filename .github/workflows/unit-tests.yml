---
name: Unit tests

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run pre-commit
        run: pre-commit run --all-files

  unit:
    name: Unit (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: unit
            label: all platforms
          - scenario: unit-ubuntu-plucky
            label: Ubuntu 25.04
          - scenario: unit-ubuntu-questing
            label: Ubuntu 25.10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run Molecule unit scenario
        run: molecule test -s ${{ matrix.scenario }}

  validate:
    name: Role validation
    runs-on: ubuntu-24.04
    needs: unit

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Validate role for Ansible Galaxy
        run: |
          cd ..
          python -m galaxy_importer.main --legacy-role --namespace kilip "${GITHUB_REPOSITORY#*/}"

      - name: Run syntax check
        run: ansible-playbook --syntax-check tests/test.yml
