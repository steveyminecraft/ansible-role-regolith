---
name: Unit tests

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Syntax check role playbook
        run: ansible-playbook --syntax-check tests/test.yml

      - name: Check-mode CI validation
        run: ansible-playbook -i inventory/ci/ci.yml playbooks/ci-check-mode.yml --check

      - name: Validate release workflow contracts
        run: bash tests/validate-release-workflows.sh

      - name: Validate gitignore is not violated by tracked files
        run: bash tests/validate-gitignore.sh

  policy:
    name: Policy and script validation
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install YAML tooling
        run: python -m pip install --upgrade pip pyyaml

      - name: Run Python unit tests and policy scripts
        run: |
          python -m unittest discover -s tests/unit -p 'test_*.py'
          python scripts/validate-role-defaults.py
          python scripts/check-ansible-version-policy.py

      - name: Validate Molecule scenario file structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path("molecule").glob("*/molecule.yml")):
              data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
              driver = (data.get("driver") or {}).get("name")
              required_keys = ["driver", "platforms", "provisioner", "scenario"]
              if driver != "vagrant":
                  required_keys = ["dependency", *required_keys]
              missing = [key for key in required_keys if key not in data]
              if missing:
                  raise SystemExit(f"{path} missing keys: {missing}")
          print("Molecule scenario structure checks passed.")
          PY

  unit:
    name: Unit (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: policy
    strategy:
      fail-fast: false
      matrix:
        include:
          - playbook: molecule/unit/converge.yml
            label: all platforms
          - playbook: molecule/unit-ubuntu-plucky/converge.yml
            label: Ubuntu 25.04
          - playbook: molecule/unit-ubuntu-questing/converge.yml
            label: Ubuntu 25.10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Run unit test playbook
        uses: ./.github/actions/run-unit-test
        with:
          playbook: ${{ matrix.playbook }}

  validate:
    name: Role validation
    runs-on: ubuntu-24.04
    needs: unit

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test

      - name: Validate role for Ansible Galaxy
        run: |
          cd ..
          python -m galaxy_importer.main --legacy-role --namespace steveyminecraft "${GITHUB_REPOSITORY#*/}"
