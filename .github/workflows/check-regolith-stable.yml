---
name: Check Regolith stable pin (docs)

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: check-regolith-stable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-stable-version:
    name: Check docs stable matches pinned component
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned role component
        id: pinned
        shell: bash
        run: |
          set -euo pipefail

          pinned="$(awk -F': ' '/^regolith_repository_component:/{print $2; exit}' defaults/main.yml)"
          if [ -z "$pinned" ]; then
            echo "Could not read regolith_repository_component from defaults/main.yml" >&2
            exit 1
          fi
          echo "value=$pinned" >> "$GITHUB_OUTPUT"

      - name: Read latest stable from Regolith docs
        id: docs
        shell: bash
        run: |
          set -euo pipefail

          docs_value="$(
            python - <<'PY'
            import re
            import urllib.request

            url = "https://regolith-desktop.com/docs/reference/releases/"

            request = urllib.request.Request(
                url,
                headers={"User-Agent": "ansible-role-regolith-version-check"},
            )

            with urllib.request.urlopen(request, timeout=20) as response:
                html = response.read().decode("utf-8", "ignore")

            versions = re.findall(
                r'(?<![\d.])(\d+\.\d+)\s+Release Notes',
                html,
            )
            if not versions:
                raise SystemExit("Could not parse stable version from docs page")

            latest = max(
                versions,
                key=lambda version: tuple(map(int, version.split("."))),
            )
            print(f"v{latest}")
            PY
          )"
          echo "value=$docs_value" >> "$GITHUB_OUTPUT"

      - name: Compare pinned vs docs stable
        id: compare
        shell: bash
        env:
          PINNED: ${{ steps.pinned.outputs.value }}
          STABLE: ${{ steps.docs.outputs.value }}
        run: |
          set -euo pipefail

          echo "Pinned component: $PINNED"
          echo "Docs stable: $STABLE"

          if [ "$PINNED" != "$STABLE" ]; then
            echo "mismatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "mismatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue when mismatch is detected
        if: steps.compare.outputs.mismatch == 'true'
        uses: actions/github-script@v9
        env:
          PINNED: ${{ steps.pinned.outputs.value }}
          STABLE: ${{ steps.docs.outputs.value }}
        with:
          script: |
            const pinned = process.env.PINNED;
            const stable = process.env.STABLE;
            const label = "regolith-stable-drift";
            const title = `Regolith stable drift: pinned ${pinned} vs docs ${stable}`;

            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: "d73a4a",
                description: "Pinned Regolith component differs from docs stable release",
              });
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              core.info(`Matching open issue already exists: #${existing.number}`);
              return;
            }

            const body = [
              "The scheduled docs-based stable version check detected drift.",
              "",
              `- pinned in \`defaults/main.yml\`: \`${pinned}\``,
              `- stable from the Regolith releases documentation: \`${stable}\``,
              "",
              "Please update:",
              "- `defaults/main.yml` (`regolith_repository_component`)",
              "- `meta/argument_specs.yml` choices, if needed",
              "- related README text, when appropriate",
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [label],
            });

      - name: Fail workflow on mismatch
        if: steps.compare.outputs.mismatch == 'true'
        env:
          PINNED: ${{ steps.pinned.outputs.value }}
          STABLE: ${{ steps.docs.outputs.value }}
        run: |
          echo "::error::Pinned component ($PINNED) does not match docs stable ($STABLE)."
          exit 1
