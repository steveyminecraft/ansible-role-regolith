---
name: Check Regolith stable pin (docs)

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: check-regolith-stable-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-stable-version:
    name: Check docs stable matches pinned component
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned role component
        id: pinned
        run: |
          pinned="$(awk -F': ' '/^regolith_repository_component:/{print $2; exit}' defaults/main.yml)"
          if [ -z "$pinned" ]; then
            echo "Could not read regolith_repository_component from defaults/main.yml" >&2
            exit 1
          fi
          echo "value=$pinned" >> "$GITHUB_OUTPUT"

      - name: Read latest stable from Regolith docs
        id: docs
        run: |
          set -euo pipefail

          docs_value="$(python -c "import re, urllib.request; url='https://regolith-desktop.com/docs/reference/releases/'; html=urllib.request.urlopen(url, timeout=20).read().decode('utf-8', 'ignore'); versions=re.findall(r'(\\d+\\.\\d+)\\s+Release Notes', html); assert versions, 'Could not parse stable version from docs page'; latest=max(versions, key=lambda value: tuple(map(int, value.split('.')))); print(f'v{latest}')")"
          echo "value=$docs_value" >> "$GITHUB_OUTPUT"

      - name: Compare pinned vs docs stable
        id: compare
        run: |
          pinned="${{ steps.pinned.outputs.value }}"
          stable="${{ steps.docs.outputs.value }}"

          echo "Pinned component: $pinned"
          echo "Docs stable: $stable"

          if [ "$pinned" != "$stable" ]; then
            echo "mismatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "mismatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue when mismatch is detected
        if: steps.compare.outputs.mismatch == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const pinned = `${{ steps.pinned.outputs.value }}`;
            const stable = `${{ steps.docs.outputs.value }}`;
            const label = "regolith-stable-drift";
            const title = `Regolith stable drift: pinned ${pinned} vs docs ${stable}`;

            const { owner, repo } = context.repo;

            const labelsResp = await github.rest.issues.listLabelsOnRepo({
              owner,
              repo,
              per_page: 100,
            });

            const hasLabel = labelsResp.data.some((entry) => entry.name === label);
            if (!hasLabel) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: "d73a4a",
                description: "Pinned Regolith component differs from docs stable release",
              });
            }

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.data.find((issue) => issue.title === title);
            if (existing) {
              core.info(`Matching open issue already exists: #${existing.number}`);
              return;
            }

            const body = [
              "The scheduled docs-based stable version check detected drift.",
              "",
              `- pinned in \`defaults/main.yml\`: \`${pinned}\``,
              `- stable from https://regolith-desktop.com/docs/reference/releases/: \`${stable}\``,
              "",
              "Please update:",
              "- `defaults/main.yml` (`regolith_repository_component`)",
              "- `meta/argument_specs.yml` choices (if needed)",
              "- related README text when appropriate",
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [label],
            });

      - name: Fail workflow on mismatch
        if: steps.compare.outputs.mismatch == 'true'
        run: |
          echo "::error::Pinned component (${{ steps.pinned.outputs.value }}) does not match docs stable (${{ steps.docs.outputs.value }})."
          exit 1
