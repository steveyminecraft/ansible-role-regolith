---
name: Vagrant integration

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      run-vagrant:
        description: "Run Molecule Vagrant scenario on a self-hosted runner"
        default: true
        required: false
        type: boolean
      vagrant-provider:
        description: "Vagrant provider"
        default: virtualbox
        required: false
        type: choice
        options:
          - virtualbox
          - libvirt

permissions:
  contents: read

jobs:
  vagrant:
    name: Molecule Vagrant (${{ inputs.vagrant-provider }})
    if: inputs.run-vagrant
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Ansible test environment
        uses: ./.github/actions/setup-ansible-test
        with:
          requirements-file: requirements.txt

      - name: Run Molecule Vagrant scenario
        run: molecule test
        env:
          MOLECULE_VAGRANT_INVENTORY: >-
            ${{ inputs.vagrant-provider == 'libvirt'
                && 'vagrant_libvirt.yml'
                || 'vagrant.yml' }}
          VAGRANT_DEFAULT_PROVIDER: ${{ inputs.vagrant-provider }}
