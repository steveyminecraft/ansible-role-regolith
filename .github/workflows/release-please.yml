---
name: Release Please

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}

    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  tag-release-candidate:
    name: Tag release candidate for AWS tests
    needs: release-please
    if: >-
      needs.release-please.outputs.prs_created == 'true'
      && needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out release PR branch
        uses: actions/checkout@v6
        with:
          ref: release-please--branches--main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create and push RC tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::RELEASE_PLEASE_TOKEN is required to push RC tags."
            exit 1
          fi

          version="$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")"
          base_tag="v${version}"
          head_sha="$(git rev-parse HEAD)"

          existing_for_commit="$(git tag -l "${base_tag}-rc.*" --points-at "${head_sha}" | paste -sd ',' - || true)"
          if [ -n "${existing_for_commit}" ]; then
            echo "RC tag already exists for ${head_sha}: ${existing_for_commit}"
            exit 0
          fi

          latest_rc=0
          while IFS= read -r tag; do
            suffix="${tag#${base_tag}-rc.}"
            if [[ "${suffix}" =~ ^[0-9]+$ ]] && (( suffix > latest_rc )); then
              latest_rc="${suffix}"
            fi
          done < <(git tag -l "${base_tag}-rc.*")

          rc_tag="${base_tag}-rc.$((latest_rc + 1))"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${rc_tag}" -m "Release candidate for ${base_tag} (release PR ${head_sha::7})" "${head_sha}"
          git push origin "${rc_tag}"
          echo "Pushed ${rc_tag}; AWS RC remote tests will start automatically."

  publish-galaxy:
    name: Publish Galaxy
    runs-on: ubuntu-24.04
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Check out released revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Import role into Ansible Galaxy
        uses: ./.github/actions/import-galaxy-role
        with:
          role-name: regolith
          git-reference: ${{ needs.release-please.outputs.tag_name }}
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
