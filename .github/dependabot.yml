---
# Dependabot waits 7 days after a release before opening update PRs (cooldown).
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
    open-pull-requests-limit: 5
