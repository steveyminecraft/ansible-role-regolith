---
name: Run integration test
description: Prepare, apply the role, verify, and check idempotence on the current container

runs:
  using: composite
  steps:
    - name: Prepare container
      shell: bash
      run: ansible-playbook -i 'localhost,' -c local molecule/common/docker_prepare.yml

    - name: Apply role
      shell: bash
      run: ansible-playbook -i 'localhost,' -c local molecule/common/converge.yml

    - name: Verify installation
      shell: bash
      run: ansible-playbook -i 'localhost,' -c local molecule/default/verify.yml

    - name: Check idempotence
      shell: bash
      run: |
        set -o pipefail
        # RUNNER_TEMP points at the host filesystem and is not mounted in container jobs.
        json_output="${GITHUB_WORKSPACE}/.regolith-idempotence.json"
        ANSIBLE_STDOUT_CALLBACK=ansible.builtin.json \
          ansible-playbook -i 'localhost,' -c local molecule/common/converge.yml \
          > "${json_output}" 2>"${json_output}.stderr"
        cat "${json_output}.stderr" >&2 || true
        python3 scripts/check-playbook-idempotence.py "${json_output}"

    - name: Verify repository configuration transitions
      shell: bash
      run: ansible-playbook -i 'localhost,' -c local molecule/common/repository_transition.yml

    - name: Verify repository suite transitions
      shell: bash
      run: ansible-playbook -i 'localhost,' -c local molecule/common/repository_suite_transition.yml
