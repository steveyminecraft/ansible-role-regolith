---
name: Import role to Ansible Galaxy
description: Import this repository as a legacy role on Ansible Galaxy

inputs:
  git-reference:
    description: Existing Git tag to import into Ansible Galaxy, for example v1.2.3
    required: true
  role-name:
    description: Galaxy role name
    required: false
    default: regolith

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Ansible
      shell: bash
      run: python -m pip install 'ansible-core>=2.20,<2.21'

    - name: Import role into Ansible Galaxy
      shell: bash
      env:
        GALAXY_API_KEY: ${{ env.GALAXY_API_KEY }}
        GIT_REFERENCE: ${{ inputs.git-reference }}
      run: |
        set -euo pipefail
        if [ -z "${GALAXY_API_KEY:-}" ]; then
          echo "GALAXY_API_KEY is required for Ansible Galaxy publication."
          exit 1
        fi

        if [[ ! "${GIT_REFERENCE}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "git-reference must be a semantic version tag such as v1.2.3."
          exit 1
        fi

        ansible-galaxy role import \
          --api-key "${GALAXY_API_KEY}" \
          --branch "${GIT_REFERENCE}" \
          --role-name "${{ inputs.role-name }}" \
          "${GITHUB_REPOSITORY_OWNER}" \
          "${GITHUB_REPOSITORY#*/}"
