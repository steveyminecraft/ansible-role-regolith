---
name: Setup Ansible test environment
description: Install Python test dependencies for CI

inputs:
  requirements-file:
    description: Pip requirements file to install
    required: false
    default: requirements-ci.txt

runs:
  using: composite
  steps:
    - name: Resolve Python 3.12+ interpreter
      shell: bash
      run: |
        set -euo pipefail
        for candidate in python3.13 python3.12 python3; do
          if command -v "${candidate}" >/dev/null 2>&1 \
            && "${candidate}" -c 'import sys; exit(0 if sys.version_info >= (3, 12) else 1)'; then
            echo "ANSIBLE_PYTHON=${candidate}" >> "${GITHUB_ENV}"
            exit 0
          fi
        done
        echo "Python 3.12+ is required for ansible-core 2.20"
        exit 1

    - name: Install test dependencies
      shell: bash
      run: |
        set -euo pipefail
        workspace="${GITHUB_WORKSPACE}"
        venv="${workspace}/.ci-venv"
        collections_path="${workspace}/.ansible/collections"

        if ! "${ANSIBLE_PYTHON}" -m venv "${venv}"; then
          if command -v apt-get >/dev/null 2>&1; then
            DEBIAN_FRONTEND=noninteractive apt-get install -y "${ANSIBLE_PYTHON}-venv"
            "${ANSIBLE_PYTHON}" -m venv "${venv}"
          else
            exit 1
          fi
        fi
        "${venv}/bin/pip" install -r "${{ inputs.requirements-file }}"
        mkdir -p "${collections_path}"

        max_attempts=5
        delay_seconds=10
        for attempt in $(seq 1 "${max_attempts}"); do
          if "${venv}/bin/ansible-galaxy" collection install ansible.posix \
            -p "${collections_path}"; then
            break
          fi
          if [ "${attempt}" -eq "${max_attempts}" ]; then
            echo "ansible-galaxy collection install failed after ${max_attempts} attempts"
            exit 1
          fi
          echo "Galaxy download failed (attempt ${attempt}/${max_attempts}); retrying in ${delay_seconds}s..."
          sleep "${delay_seconds}"
          delay_seconds=$((delay_seconds * 2))
        done

        echo "${venv}/bin" >> "${GITHUB_PATH}"
